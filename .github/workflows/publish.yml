name: Publish Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: NuGet package version to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NUGET_SOURCE_URL: https://api.nuget.org/v3/index.json

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if [ -z "$VERSION" ]; then
            echo "Package version could not be determined." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore HmacAuth.sln --configfile nuget.config

      - name: Build
        run: dotnet build HmacAuth.sln --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test HmacAuth.sln --configuration Release --no-build

      - name: Pack
        run: dotnet pack HmacAuth.sln --configuration Release --no-build --output ${{ github.workspace }}/artifacts/packages -p:PackageVersion=${{ steps.version.outputs.version }} -p:Version=${{ steps.version.outputs.version }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.version }}
          path: artifacts/packages/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish packages to NuGet.org
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "Missing NUGET_API_KEY secret." >&2
            exit 1
          fi

          dotnet nuget push artifacts/packages/*.nupkg --api-key "$NUGET_API_KEY" --source "$NUGET_SOURCE_URL" --skip-duplicate
          dotnet nuget push artifacts/packages/*.snupkg --api-key "$NUGET_API_KEY" --source "$NUGET_SOURCE_URL" --skip-duplicate
