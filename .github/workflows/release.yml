name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, for example 0.1.0"
        required: true
        type: string
      publish_to_nuget:
        description: "Push the generated packages to NuGet"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      NUGET_SOURCE_URL: https://api.nuget.org/v3/index.json

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
              $version = "${{ github.event.inputs.version }}"
          }
          else {
              $version = "${{ github.ref_name }}"
              if ($version.StartsWith("v")) {
                  $version = $version.Substring(1)
              }
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
              throw "Could not determine release version."
          }

          "package_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore HmacAuth.sln --configfile nuget.config

      - name: Build
        run: >
          dotnet build HmacAuth.sln
          --configuration Release
          --no-restore
          /p:Version=${{ steps.version.outputs.package_version }}
          /p:ContinuousIntegrationBuild=true

      - name: Run tests
        run: dotnet test HmacAuth.sln --configuration Release --no-build --no-restore

      - name: Pack
        run: >
          dotnet pack HmacAuth.sln
          --configuration Release
          --no-build
          --no-restore
          --output artifacts/packages
          /p:Version=${{ steps.version.outputs.package_version }}
          /p:PackageVersion=${{ steps.version.outputs.package_version }}
          /p:ContinuousIntegrationBuild=true
          /p:IncludeSymbols=true
          /p:SymbolPackageFormat=snupkg

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HmacAuth-${{ steps.version.outputs.package_version }}
          path: artifacts/packages/*
          if-no-files-found: error

      - name: Push package to NuGet
        shell: bash
        run: |
          if [ -z "${NUGET_API_KEY}" ]; then
            echo "NUGET_API_KEY is not configured. Skipping NuGet package publish."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.publish_to_nuget }}" != "true" ]; then
            echo "publish_to_nuget is disabled for this manual run. Skipping NuGet package publish."
            exit 0
          fi

          dotnet nuget push artifacts/packages/*.nupkg \
            --source "${NUGET_SOURCE_URL}" \
            --api-key "${NUGET_API_KEY}" \
            --skip-duplicate

      - name: Push symbol package to NuGet
        shell: bash
        run: |
          if [ -z "${NUGET_API_KEY}" ]; then
            echo "NUGET_API_KEY is not configured. Skipping NuGet symbol package publish."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.publish_to_nuget }}" != "true" ]; then
            echo "publish_to_nuget is disabled for this manual run. Skipping NuGet symbol package publish."
            exit 0
          fi

          dotnet nuget push artifacts/packages/*.snupkg \
            --source "${NUGET_SOURCE_URL}" \
            --api-key "${NUGET_API_KEY}" \
            --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.package_version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
