name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore HmacAuth.sln --configfile nuget.config

      - name: Build
        run: dotnet build HmacAuth.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test HmacAuth.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Pack
        run: dotnet pack HmacAuth.sln --configuration Release --no-build --output ${{ github.workspace }}/artifacts/packages

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/**/TestResults/**/*.trx
          if-no-files-found: error

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages/*
          if-no-files-found: error
          retention-days: 14
